apiVersion: v1
kind: ServiceAccount
metadata:
  name: ado-service-account
  namespace: default
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: ado-ClusterRole
  namespace: default
rules:
- apiGroups: ['*']
  resources: ['*']
  verbs: ['*']

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ado-clusterRole-Binding
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ado-ClusterRole
subjects:
- kind: ServiceAccount
  name: ado-service-account
  namespace: default